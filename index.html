<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMyBuy - Friend Request</title>

    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="icon" href="favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="favicon-16x16.png" sizes="16x16" type="image/png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1d29;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            align-items: flex-start;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15), transparent 70%);
            top: -200px;
            right: -150px;
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.1), transparent 70%);
            bottom: -150px;
            left: -100px;
            border-radius: 50%;
            pointer-events: none;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #90CAF9;
            margin-bottom: 25px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: rgba(144, 202, 249, 0.15);
            border: 2px solid rgba(144, 202, 249, 0.35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            font-weight: bold;
            color: #90CAF9;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .username {
            color: #90CAF9;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 20px;
        }

        p {
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            background: #90CAF9;
            color: #1a1d29;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, opacity 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-bottom: 12px;
        }

        .button:active {
            transform: scale(0.98);
        }

        .button-secondary {
            background: rgba(144, 202, 249, 0.1);
            color: #90CAF9;
            border: 2px solid rgba(144, 202, 249, 0.35);
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: #90CAF9;
        }

        .spinner {
            border: 3px solid rgba(144, 202, 249, 0.2);
            border-top: 3px solid #90CAF9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .error {
            display: none;
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.3);
            color: #ff8080;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            margin: 0 8px;
        }

        .footer a:hover {
            color: white;
            text-decoration: underline;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .logo {
                font-size: 24px;
            }

            h1 {
                font-size: 20px;
            }

            .username {
                font-size: 18px;
            }

            .lang-selector {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">RateMyBuy</div>
        
        <div class="avatar" id="avatar">?</div>
        <h1 id="title">Freundschaftsanfrage</h1>
        <div class="username" id="username">Lädt...</div>
        
        <div class="error" id="error">
            <span id="errorText">Ungültiger Link. Bitte überprüfe den Link und versuche es erneut.</span>
        </div>
        
        <p id="description">Möchtest du diese Person zu deinen Freunden in RateMyBuy hinzufügen?</p>
        
        <button class="button" id="openAppBtn" onclick="openApp()">
            <span id="openAppText">App öffnen</span>
        </button>
        
        <a href="https://ratemybuy.klemp-roeder.com/get" class="button button-secondary" id="aboutBtn">
            <span id="aboutText">RateMyBuy herunterladen</span>
        </a>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">App wird geöffnet...</p>
        </div>
        
        <div class="footer">
            <a href="https://klemp-roeder.de/Impressum" target="_blank" id="imprintText">Impressum</a>
            |
            <a href="https://klemp-roeder.de/Datenschutz" target="_blank" id="privacyPolicyText">Datenschutz</a>
            |
            <a href="https://klemp-roeder.de/RateMyBuy" target="_blank" id="aboutLinkText">Über RateMyBuy</a>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            de: {
                title: "Freundschaftsanfrage",
                loading: "Lädt...",
                unknownUser: "Unbekannter Benutzer",
                description: "Möchtest du diese Person zu deinen Freunden in RateMyBuy hinzufügen?",
                openApp: "App öffnen",
                about: "RateMyBuy herunterladen",
                loadingApp: "App wird geöffnet...",
                storeText: "App noch nicht installiert?",
                error: "Ungültiger Link. Bitte überprüfe den Link und versuche es erneut.",
                mobileAlert: "Bitte öffne diesen Link auf deinem Smartphone",
                imprint: "Impressum",
                privacyPolicy: "Datenschutz",
                aboutLink: "Über RateMyBuy",
                appStoreBadge: "de-de",
                playStoreBadge: "de_badge_web_generic"
            },
            en: {
                title: "Friend Request",
                loading: "Loading...",
                unknownUser: "Unknown User",
                description: "Do you want to add this person to your friends in RateMyBuy?",
                openApp: "Open App",
                about: "Download RateMyBuy",
                loadingApp: "Opening app...",
                storeText: "App not installed yet?",
                error: "Invalid link. Please check the link and try again.",
                mobileAlert: "Please open this link on your smartphone",
                imprint: "Imprint",
                privacyPolicy: "Privacy Policy",
                aboutLink: "About RateMyBuy",
                appStoreBadge: "en-us",
                playStoreBadge: "en_badge_web_generic"
            }
        };

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
        const username = urlParams.get('username');
        let currentLang = urlParams.get('lang') || 'en';

        let appOpenAttempted = false;
        let storeRedirectTimer = null;

        // Detect browser language if no lang parameter
        if (!urlParams.get('lang')) {
            const browserLang = (navigator.language || navigator.userLanguage).split('-')[0];
            currentLang = (browserLang === 'de') ? 'de' : 'en';
        }

        // Apply translations
        function applyTranslations(lang) {
            const t = translations[lang] || translations.de;
            
            document.documentElement.lang = lang;
            document.getElementById('title').textContent = t.title;
            document.getElementById('description').textContent = t.description;
            document.getElementById('openAppText').textContent = t.openApp;
            document.getElementById('aboutText').textContent = t.about;
            document.getElementById('loadingText').textContent = t.loadingApp;
            document.getElementById('errorText').textContent = t.error;
            document.getElementById('imprintText').textContent = t.imprint;
            document.getElementById('privacyPolicyText').textContent = t.privacyPolicy;
            document.getElementById('aboutLinkText').textContent = t.aboutLink;
            
            // Save language preference
            currentLang = lang;
        }

        function isValidUsername(username) {
            if (!username || username.trim() === '') return false;
            
            const trimmedUsername = username.trim();
            
            // Check length (3-15 characters)
            if (trimmedUsername.length < 3 || trimmedUsername.length > 15) return false;
            
            // Check for allowed characters only (letters, numbers, dot, minus, underscore)
            const validPattern = /^[a-zA-Z0-9._-]+$/;
            if (!validPattern.test(trimmedUsername)) return false;
            
            return true;
        }

        // Initialize page
        function initializePage() {
            applyTranslations(currentLang);
            
            if (isValidUsername(username)) {
                document.getElementById('username').textContent = '@' + username;
                const firstLetter = username.charAt(0).toUpperCase();
                document.getElementById('avatar').textContent = firstLetter;
                document.getElementById('openAppBtn').style.display = 'block';
                document.getElementById('aboutBtn').style.display = 'block';
                document.getElementById('description').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('username').textContent = translations[currentLang].unknownUser;
                document.getElementById('avatar').textContent = '?';
                document.getElementById('openAppBtn').style.display = 'none';
                document.getElementById('aboutBtn').style.display = 'block';
                document.getElementById('description').style.display = 'none';
            }
        }
        
        function openApp() {
            if (appOpenAttempted) {
                return;
            }
            
            if (!isValidUsername(username)) {
                document.getElementById('error').style.display = 'block';
                return;
            }

            appOpenAttempted = true;
            
            const button = document.getElementById('openAppBtn');
            const loading = document.getElementById('loading');
            const aboutBtn = document.getElementById('aboutBtn');
            
            button.style.display = 'none';
            aboutBtn.style.display = 'none';
            loading.style.display = 'block';
            
            const appUrl = `ratemybuy://friend-request?username=${encodeURIComponent(username)}`;
            
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);
            
            if (isIOS || isAndroid) {
                // Versuche App zu öffnen
                window.location.href = appUrl;
                
                // Nur zu Store weiterleiten wenn App nicht geöffnet wurde
                storeRedirectTimer = setTimeout(() => {
                    // Prüfe ob User noch auf der Seite ist (App hat nicht geöffnet)
                    if (document.visibilityState === 'visible') {
                        if (isIOS) {
                            window.location.href = 'https://apps.apple.com/app/id6752779751';
                        } else if (isAndroid) {
                            window.location.href = 'https://play.google.com/store/apps/details?id=com.ratemybuy.ratemybuy';
                        }
                    } else {
                        console.log('App likely opened, skipping store redirect');
                    }
                }, 3000);
                
                // Cleanup wenn App öffnet
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'hidden') {
                        // App hat vermutlich geöffnet
                        if (storeRedirectTimer) {
                            clearTimeout(storeRedirectTimer);
                            storeRedirectTimer = null;
                            console.log('Page hidden, app likely opened');
                        }
                    }
                });
                
                // Cleanup wenn Seite Fokus verliert
                window.addEventListener('blur', () => {
                    if (storeRedirectTimer) {
                        clearTimeout(storeRedirectTimer);
                        storeRedirectTimer = null;
                        console.log('Window blur, app likely opened');
                    }
                });
                
            } else {
                alert(translations[currentLang].mobileAlert);
                button.style.display = 'block';
                if (aboutBtn) aboutBtn.style.display = 'block';
                loading.style.display = 'none';
                appOpenAttempted = false;
            }
        }
        
        // Initialize page on load
        initializePage();
    </script>
</body>
</html>
