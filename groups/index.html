<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1d29">
    <title>RateMyBuy - Gruppen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: #1a1d29;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15), transparent 70%);
            top: -200px;
            right: -150px;
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(78, 205, 196, 0.1), transparent 70%);
            bottom: -150px;
            left: -100px;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 400px;
        }
        
        .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            background: white;
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .container h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        
        .container p {
            margin: 0 0 30px 0;
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        footer {
            margin-top: auto;
            padding-bottom: 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        footer a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        footer a:hover {
            color: white;
            text-decoration: underline;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-decoration: none;
            display: block;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #90CAF9;
            color: #1a1d29;
        }

        .btn-secondary {
            background: rgba(144, 202, 249, 0.1);
            color: #90CAF9;
            border: 2px solid rgba(144, 202, 249, 0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">
            <img src="logo.png" alt="Logo">
        </div>
        <h2 id="fallbackTitle">App öffnet sich nicht?</h2>
        <p id="fallbackText">Lade die App herunter, um diese Gruppe zu öffnen.</p>
        <div class="button-group">
            <a href="#" class="btn btn-primary" id="storeBtn">App herunterladen</a>
            <a href="#" class="btn btn-secondary" id="retryBtn">App bereits installiert? Öffnen</a>
        </div>
    </div>
        <footer>
        <a href="#" id="linkImpressum"></a>
        <span>·</span>
        <a href="#" id="linkAbout"></a>
        <span>·</span>
        <a href="#" id="linkPrivacy"></a>
    </footer>
    
    <script>
        (function() {
            // Translations
            const translations = {
                de: {
                    title: 'RateMyBuy - Gruppen',
                    fallbackTitle: 'App öffnet sich nicht?',
                    fallbackText: 'Öffne RateMyBuy manuell oder lade die App herunter',
                    retryBtn: 'App bereits installiert? Öffnen',
                    storeBtn: 'RateMyBuy herunterladen',
                    impressum: 'Impressum',
                    about: 'Über die App',
                    privacy: 'Datenschutzerklärung'
                },
                en: {
                    title: 'RateMyBuy - Groups',
                    fallbackTitle: 'App not opening?',
                    fallbackText: 'Open RateMyBuy manually or download the app',
                    retryBtn: 'Already installed? Open app',
                    storeBtn: 'Download RateMyBuy',
                    impressum: 'Legal Notice',
                    about: 'About the App',
                    privacy: 'Privacy Policy'
                }
            };
            
            // Detect browser language
            const detectLanguage = () => {
                const browserLang = navigator.language || navigator.userLanguage;
                return browserLang.startsWith('de') ? 'de' : 'en';
            };
            
            const lang = detectLanguage();
            const t = translations[lang];
            
            // Apply translations
            document.title = t.title;
            document.documentElement.lang = lang;
            document.getElementById('fallbackTitle').textContent = t.fallbackTitle;
            document.getElementById('fallbackText').textContent = t.fallbackText;
            document.getElementById('retryBtn').textContent = t.retryBtn;
            document.getElementById('storeBtn').textContent = t.storeBtn;
            document.getElementById('linkImpressum').textContent = t.impressum;
            document.getElementById('linkAbout').textContent = t.about;
            document.getElementById('linkPrivacy').textContent = t.privacy;

            document.getElementById('linkImpressum').href = 'https://klemp-roeder.de/Impressum';
            document.getElementById('linkAbout').href = 'https://klemp-roeder.de/RateMyBuy';
            document.getElementById('linkPrivacy').href = 'https://klemp-roeder.de/Datenschutz';
            
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('groupId');
            
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);
            
            if (!isIOS && !isAndroid) {
                window.location.href = 'https://klemp-roeder.de/RateMyBuy';
                return;
            }
            
            // App URL
            let appUrl;
            if (groupId && groupId.trim() !== '') {
                appUrl = `ratemybuy://?groupId=${encodeURIComponent(groupId)}`;
            } else {
                appUrl = 'ratemybuy://?openGroups=true';
            }
            
            // Store URLs
            const iosStoreUrl = 'https://apps.apple.com/app/id6752779751';
            const androidStoreUrl = 'https://play.google.com/store/apps/details?id=com.ratemybuy.ratemybuy';
            const storeUrl = isIOS ? iosStoreUrl : androidStoreUrl;
            
            const storeBtn = document.getElementById('storeBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            storeBtn.href = storeUrl;
            
            let storeRedirectTimer = null;
            let appOpenAttempted = false;
            
            const tryOpenApp = () => {
                if (appOpenAttempted) return;
                appOpenAttempted = true;
                
                window.location.href = appUrl;
                
                storeRedirectTimer = setTimeout(() => {
                    if (document.visibilityState === 'visible') {
                        window.location.href = storeUrl;
                    }
                }, 3000);
                            
                // Cleanup wenn App öffnet (Seite wird versteckt)
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'hidden' && storeRedirectTimer) {
                        clearTimeout(storeRedirectTimer);
                        storeRedirectTimer = null;
                    }
                });
                
                // Cleanup wenn Fenster Fokus verliert
                window.addEventListener('blur', () => {
                    if (storeRedirectTimer) {
                        clearTimeout(storeRedirectTimer);
                        storeRedirectTimer = null;
                    }
                });
            };
            
            // Retry Button
            retryBtn.addEventListener('click', (e) => {
                e.preventDefault();
                tryOpenApp();
            });
            
        })();
    </script>
</body>
</html>
