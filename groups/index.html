<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMyBuy - Gruppen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 400px;
        }
        
        .app-icon {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        
        .status-message {
            margin: 0 0 10px 0;
            font-size: 18px;
            opacity: 0.95;
        }
        
        .container h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        
        .container p {
            margin: 0 0 30px 0;
            font-size: 16px;
            opacity: 0.9;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-decoration: none;
            display: block;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .opening-indicator {
            display: inline-block;
            margin-left: 8px;
            opacity: 0;
            animation: fadeInOut 1.5s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">🛒</div>
        <p class="status-message" id="statusMessage">
            App wird geöffnet<span class="opening-indicator">...</span>
        </p>
        <h2 id="fallbackTitle">App öffnet sich nicht?</h2>
        <p id="fallbackText">Öffne RateMyBuy manuell oder lade die App herunter</p>
        <div class="button-group">
            <a href="#" class="btn btn-primary" id="retryBtn">App erneut öffnen</a>
            <a href="#" class="btn btn-secondary" id="storeBtn">Im Store öffnen</a>
        </div>
    </div>
    
    <script>
        (function() {
            // Translations
            const translations = {
                de: {
                    title: 'RateMyBuy - Gruppen',
                    statusMessage: 'App wird geöffnet',
                    fallbackTitle: 'App öffnet sich nicht?',
                    fallbackText: 'Öffne RateMyBuy manuell oder lade die App herunter',
                    retryBtn: 'App erneut öffnen',
                    storeBtn: 'Im Store öffnen'
                },
                en: {
                    title: 'RateMyBuy - Groups',
                    statusMessage: 'Opening app',
                    fallbackTitle: 'App not opening?',
                    fallbackText: 'Open RateMyBuy manually or download the app',
                    retryBtn: 'Open app again',
                    storeBtn: 'Open in Store'
                }
            };
            
            // Detect browser language
            const detectLanguage = () => {
                const browserLang = navigator.language || navigator.userLanguage;
                return browserLang.startsWith('de') ? 'de' : 'en';
            };
            
            const lang = detectLanguage();
            const t = translations[lang];
            
            // Apply translations
            document.title = t.title;
            document.documentElement.lang = lang;
            document.getElementById('statusMessage').innerHTML = 
                t.statusMessage + '<span class="opening-indicator">...</span>';
            document.getElementById('fallbackTitle').textContent = t.fallbackTitle;
            document.getElementById('fallbackText').textContent = t.fallbackText;
            document.getElementById('retryBtn').textContent = t.retryBtn;
            document.getElementById('storeBtn').textContent = t.storeBtn;
            
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('groupId');
            
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);
            
            // Desktop-Redirect
            if (!isIOS && !isAndroid) {
                window.location.href = 'https://klemp-roeder.de/RateMyBuy';
                return;
            }
            
            // App URL
            let appUrl;
            if (groupId && groupId.trim() !== '') {
                appUrl = `ratemybuy://?groupId=${encodeURIComponent(groupId)}`;
            } else {
                appUrl = 'ratemybuy://?openGroups=true';
            }
            
            // Store URLs
            const iosStoreUrl = 'https://apps.apple.com/app/id6752779751';
            const androidStoreUrl = 'https://play.google.com/store/apps/details?id=com.ratemybuy.ratemybuy';
            const storeUrl = isIOS ? iosStoreUrl : androidStoreUrl;
            
            const storeBtn = document.getElementById('storeBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            storeBtn.href = storeUrl;
            
            const tryOpenApp = () => {
                window.location.href = appUrl;
            };
            
            // Retry Button
            retryBtn.addEventListener('click', (e) => {
                e.preventDefault();
                tryOpenApp();
            });
            
            // Initial App öffnen
            tryOpenApp();
            
        })();
    </script>
</body>
</html>
