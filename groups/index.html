<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMyBuy - Gruppen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fallback-container {
            display: none;
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 400px;
        }
        
        .fallback-container.show {
            display: block;
        }
        
        .fallback-container h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        
        .fallback-container p {
            margin: 0 0 30px 0;
            font-size: 16px;
            opacity: 0.9;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            text-decoration: none;
            display: block;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="spinner" id="spinner"></div>
    
    <div class="fallback-container" id="fallback">
        <h2 id="fallbackTitle">App nicht installiert?</h2>
        <p id="fallbackText">Lade RateMyBuy herunter oder öffne die App manuell</p>
        <div class="button-group">
            <a href="#" class="btn btn-primary" id="storeBtn">Im Store öffnen</a>
            <a href="#" class="btn btn-secondary" id="retryBtn">App erneut öffnen</a>
        </div>
    </div>
    
    <script>
        (function() {
            // Translations
            const translations = {
                de: {
                    title: 'RateMyBuy - Gruppen',
                    fallbackTitle: 'App nicht installiert?',
                    fallbackText: 'Lade RateMyBuy herunter oder öffne die App manuell',
                    storeBtn: 'Im Store öffnen',
                    retryBtn: 'App erneut öffnen'
                },
                en: {
                    title: 'RateMyBuy - Groups',
                    fallbackTitle: 'App not installed?',
                    fallbackText: 'Download RateMyBuy or open the app manually',
                    storeBtn: 'Open in Store',
                    retryBtn: 'Open app again'
                }
            };
            
            // Detect browser language
            const detectLanguage = () => {
                const browserLang = navigator.language || navigator.userLanguage;
                return browserLang.startsWith('de') ? 'de' : 'en';
            };
            
            const lang = detectLanguage();
            const t = translations[lang];
            
            // Apply translations
            document.title = t.title;
            document.documentElement.lang = lang;
            document.getElementById('fallbackTitle').textContent = t.fallbackTitle;
            document.getElementById('fallbackText').textContent = t.fallbackText;
            document.getElementById('storeBtn').textContent = t.storeBtn;
            document.getElementById('retryBtn').textContent = t.retryBtn;
            
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('groupId');
            
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            const isAndroid = /Android/.test(navigator.userAgent);
            
            // Desktop-Redirect
            if (!isIOS && !isAndroid) {
                window.location.href = 'https://klemp-roeder.de/RateMyBuy';
                return;
            }
            
            // App URL
            let appUrl;
            if (groupId && groupId.trim() !== '') {
                appUrl = `ratemybuy://?groupId=${encodeURIComponent(groupId)}`;
            } else {
                appUrl = 'ratemybuy://?openGroups=true';
            }
            
            // Store URLs
            const iosStoreUrl = 'https://apps.apple.com/app/id6752779751';
            const androidStoreUrl = 'https://play.google.com/store/apps/details?id=com.ratemybuy.ratemybuy';
            const storeUrl = isIOS ? iosStoreUrl : androidStoreUrl;
            
            let appOpened = false;
            let fallbackTimer = null;
            
            const spinner = document.getElementById('spinner');
            const fallback = document.getElementById('fallback');
            const storeBtn = document.getElementById('storeBtn');
            const retryBtn = document.getElementById('retryBtn');
            
            storeBtn.href = storeUrl;
            
            const showFallback = () => {
                if (appOpened) return;
                spinner.style.display = 'none';
                fallback.classList.add('show');
            };
            
            const tryOpenApp = () => {
                appOpened = false;
                
                window.location.href = appUrl;
                
                // Fallback Timer starten
                if (fallbackTimer) clearTimeout(fallbackTimer);
                fallbackTimer = setTimeout(showFallback, 2500);
            };
            
            // Events um zu erkennen ob App geöffnet wurde
            const handleAppOpened = () => {
                appOpened = true;
                if (fallbackTimer) {
                    clearTimeout(fallbackTimer);
                }
            };
            
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    handleAppOpened();
                }
            });
            
            window.addEventListener('blur', handleAppOpened);
            window.addEventListener('pagehide', handleAppOpened);
            
            // Retry Button
            retryBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fallback.classList.remove('show');
                spinner.style.display = 'block';
                tryOpenApp();
            });
            
            // Initial App öffnen
            tryOpenApp();
            
        })();
    </script>
</body>
</html>
